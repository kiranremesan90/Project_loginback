<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-commerce Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-6xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Checkout</h1>

<div class="grid md:grid-cols-3 gap-6">

<!-- Customer Details -->
<div class="md:col-span-2 bg-white p-6 rounded-2xl shadow">

<h2 class="text-xl font-semibold mb-4">Shipping Address</h2>

<div class="grid md:grid-cols-2 gap-4">

<input class="border p-3 rounded-lg" placeholder="Full Name">
<input class="border p-3 rounded-lg" placeholder="Phone Number">

<input class="border p-3 rounded-lg col-span-2" placeholder="Email">

<input class="border p-3 rounded-lg col-span-2" placeholder="Address">

<input class="border p-3 rounded-lg" placeholder="City">
<input class="border p-3 rounded-lg" placeholder="Pincode">

</div>

<!-- Payment Method -->
<h2 class="text-xl font-semibold mt-8 mb-4">Payment Method</h2>

<div class="space-y-3">

<label class="flex items-center gap-3">
<input type="radio" name="payment" onclick="showPayment('upi')" checked>
UPI Payment
</label>

<label class="flex items-center gap-3">
<input type="radio" name="payment" onclick="showPayment('card')">
Debit / Credit Card
</label>

<label class="flex items-center gap-3">
<input type="radio" name="payment" onclick="showPayment('cod')">
Cash on Delivery
</label>

</div>

<!-- UPI -->
<div id="upi" class="mt-4">
<input class="border p-3 rounded-lg w-full" placeholder="Enter UPI ID (example@upi)">
</div>

<!-- Card -->
<div id="card" class="mt-4 hidden space-y-3">

<input class="border p-3 rounded-lg w-full" placeholder="Card Number">

<div class="grid grid-cols-2 gap-3">
<input class="border p-3 rounded-lg" placeholder="MM/YY">
<input class="border p-3 rounded-lg" placeholder="CVV">
</div>

</div>

<!-- COD -->
<div id="cod" class="mt-4 hidden text-green-600 font-medium">
Pay with cash when the product is delivered.
</div>

<button class="mt-6 w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition">
Place Order
</button>

</div>

<!-- Order Summary -->
<div class="bg-white p-6 rounded-2xl shadow h-fit">

<h2 class="text-xl font-semibold mb-4">Order Summary</h2>

<div class="space-y-3">

<div class="flex justify-between">
<span>T-Shirt</span>
<span>₹799</span>
</div>

<div class="flex justify-between">
<span>Shoes</span>
<span>₹1499</span>
</div>

<div class="flex justify-between">
<span>Delivery</span>
<span>₹50</span>
</div>

<hr>

<div class="flex justify-between font-bold text-lg">
<span>Total</span>
<span>₹2348</span>
</div>

</div>

</div>

</div>

</div>

<script>
function showPayment(type) {
document.getElementById('upi').classList.add('hidden');
document.getElementById('card').classList.add('hidden');
document.getElementById('cod').classList.add('hidden');

document.getElementById(type).classList.remove('hidden');
}
</script>

</body>
</html>
